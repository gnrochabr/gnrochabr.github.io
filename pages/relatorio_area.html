<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório por Área Disciplinar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        /* Estilos existentes */
        #pdfContainer {
            padding: 10px;
            background-color: white;
        }
        #pdfContainer table {
            font-size: 11px;
            width: 100%;
            table-layout: fixed;
        }
    
        #colArea, #relatorioTable tbody tr td:nth-child(1) {
            width: 20%;
        }
        #colQtd, #relatorioTable tbody tr td:nth-child(2) {
            text-align: center;
            width: 20%;
        }
        #colCarga, #relatorioTable tbody tr td:nth-child(3) {
            text-align: center;
            width: 20%;
        }
        #colDisciplinas, #relatorioTable tbody tr td:nth-child(4) {
            width: 40%;
            white-space: normal;
        }
        .label-expandido {
            width: 100%;
        }
        .form-control {
            width: 100%;
            box-sizing: border-box;
        }

        /* Estilo para botões de tamanho fixo com texto e ícone */
        .btn-full {
            min-width: 120px;
        }
        .btn-fixed-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-sizing: border-box;
        }
        .btn-fixed-icon .fas {
            margin: 0 !important;
        }
        
        /* Media Query para telas pequenas: esconde o texto dos botões de exportação */
        @media (max-width: 767px) {
            .btn-export-text {
                display: none;
            }
            .btn-export {
                width: 38px;
                padding: 0;
            }
        }
    </style>
</head>

<body class="bg-light">

    <header class="container mt-5">
        <a href="../index.html" class="btn btn-secondary mb-4 btn-custom-back">
            <i class="fas fa-arrow-left me-2"></i> Voltar ao Dashboard
        </a>
        <h2 class="mb-4 text-success"><i class="fas fa-file-alt me-2"></i> Relatório por Área Disciplinar</h2>
        <p class="lead text-muted mb-4">Visualize todas as disciplinas agrupadas por sua área e carga horária total.</p>
    </header>

    <main class="container">
        
        <section class="card shadow-sm p-4 mb-4">
            <h3 class="card-title text-secondary mb-3">Filtros e Ações</h3>
            <div class="row g-3">
                <div class="col-md-6 d-flex flex-column">
                    <label for="filtroArea" class="form-label">Filtrar por nome da área:</label>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control" id="filtroArea" placeholder="Ex: Engenharia de Software">
                        <button id="btnGerarRelatorio" class="btn btn-primary btn-full"><i class="fas fa-sync-alt me-2"></i> Atualizar</button>
                    </div>
                </div>

                <div class="col-md-6 d-flex flex-column align-items-md-end">
                    <label class="form-label" for="exportButtons">Exportar para:</label>
                    <div class="d-flex gap-2" id="exportButtons">
                        <button id="btnExportarPlanilha" class="btn btn-success btn-sm btn-export"><i class="fas fa-file-excel"></i> <span class="btn-export-text">XLS</span></button>
                        <button id="btnExportarOds" class="btn btn-info text-white btn-sm btn-export"><i class="fas fa-file-alt"></i> <span class="btn-export-text">ODS</span></button>
                    </div>
                </div>
            </div>
        </section>

        <section class="card shadow-sm p-4">
            <h3 class="card-title text-secondary mb-3">Detalhes por Área</h3>
            <div id="pdfContainer" class="table-responsive">
                <table class="table table-striped table-hover" id="relatorioTable" style="font-size: 1em; text-align:center">
                    <thead class="table-dark">
                        <tr>
                            <th>Área Disciplinar</th>
                            <th>Quantidade de Disciplinas</th>
                            <th>Carga Horária Total</th>
                            <th>Disciplinas</th>
                        </tr>
                    </thead>
                    <tbody id="relatorioTableBody" style="font-size: 1em;">
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../js/relatorioArea.js"></script>
</body>
</html>
