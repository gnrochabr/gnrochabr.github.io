<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Docente - CH Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        #pdfContainer {
            padding: 10px;
            background-color: white;
        }
        #pdfContainer table {
            font-size: 11px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <a href="../index.html" class="btn btn-secondary mb-4 btn-custom-back">
            <i class="fas fa-arrow-left me-2"></i> Voltar ao Dashboard
        </a>
        <div class="form-section">
            <h2 class="mb-4 text-primary"><i class="fas fa-file-alt me-2"></i> Relatório de Carga Horária Docente</h2>
            <p class="text-muted mb-4">Visualize a carga horária total atribuída a cada professor por curso e verifique a suficiência.</p>

            <div class="row mb-4">
                <h6 class="mb-4 text-primary"><u> Cargas horárias máxima e mínimas:</u></h6>
                <div class="col-md-4">
                    <label for="cargaMinimaHoras" class="form-label">Carga Horária Mínima (horas):</label>
                    <input type="number" class="form-control" id="cargaMinimaHoras" value="10" min="0" required>
                </div>
                <div class="col-md-4">
                    <label for="cargaMaximaHoras" class="form-label">Carga Horária Máxima (horas):</label>
                    <input type="number" class="form-control" id="cargaMaximaHoras" value="20" min="0" required>
                </div>
            </div>
            <hr>
            <h6 class="mb-4 text-primary"><u> Filtros:</u></h6>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="filtroGeral" class="form-label">Buscar por Professor, Disciplina ou Curso:</label>
                    <input type="text" class="form-control" id="filtroGeral" placeholder="Digite para filtrar...">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <button id="btnGerarRelatorio" class="btn btn-primary"><i class="fas fa-search me-2"></i> Gerar Relatório</button>
                <button id="btnExportarPdf" class="btn btn-danger"><i class="fas fa-file-pdf me-2"></i> Exportar para PDF</button>
            </div>

            <h3 class="mt-5 mb-3 text-secondary">Carga Horária por Professor e Curso</h3>
            <div id="pdfContainer">
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="relatorioTable">
                        <thead>
                            <tr id="tableHeaderRow">
                                <th>Professor</th>
                                <th>Total CH Atribuída</th>
                                <th>Suficiência</th>
                            </tr>
                        </thead>
                        <tbody id="relatorioTableBody">
                            <tr><td colspan="3" class="text-center">Carregando dados...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/relatorioDocente.js"></script>
</body>
</html>
